<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Atharv's Trading Company</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1560BD 0%, #1E90FF 100%);
      color: #fff;
      padding: 1.5rem;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 2.5rem 2rem;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 1.25rem;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #fff;
      color: #1560BD;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 0.75rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. Please check your
      network and try again.
    </p>
    <a class="btn" href="/" onclick="window.location.reload()">
      Try Again
    </a>
  </div>
</body>
</html>
